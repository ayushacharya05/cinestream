<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Premium Streaming Platform</title>
    <style>
        /* CineStream Core Signature Styling */
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #141414;
            --accent-color: #e50914;
            --accent-hover: #b80710;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --rating-gold: #ffb612;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        header {
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .brand-title {
            color: var(--accent-color);
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0;
        }

        /* Movie Row / Grid Framework */
        .content-section {
            padding: 20px 4%;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .movie-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Responsive Movie Card Layout */
        .movie-card {
            background-color: var(--surface-color);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.2);
        }

        .poster-container {
            position: relative;
            width: 100%;
            padding-top: 145%; /* Cinematic poster aspect ratio */
            background-color: #222;
        }

        .movie-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.75);
            color: var(--rating-gold);
            padding: 4px 8px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 182, 18, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .movie-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .movie-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .movie-description {
            font-size: 0.8rem;
            color: #c4c4c4;
            line-height: 1.4;
            margin: 0 0 14px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .stream-btn {
            display: block;
            text-align: center;
            background-color: var(--accent-color);
            color: var(--text-primary);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease;
        }

        .stream-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Responsive Breakpoints */
        @media (max-width: 600px) {
            .movie-row {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }
            .movie-title { font-size: 0.9rem; }
            .movie-description { display: none; } /* Saves vertical screen space on mobile */
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">CineStream</div>
    </header>

    <!-- Content Sections loaded via CMS Engine -->
    <main class="content-section">
        
        <h2 class="section-title">Bollywood Hits</h2>
        <div id="bollywood-row" class="movie-row"></div>

        <h2 class="section-title">Must-Watch Web Series</h2>
        <div id="series-row" class="movie-row"></div>

    </main>

    <script src="app.js"></script>
</body>
</html>
