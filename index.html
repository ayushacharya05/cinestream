<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream Ultra | Next-Gen Entertainment Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Design System Architecture Tokens */
        :root {
            --bg-deep: #050507;
            --bg-surface: #0f0f13;
            --bg-surface-elevated: #17171f;
            --accent-primary: #e50914;
            --accent-glow: rgba(229, 9, 20, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --text-accent: #ffcc00;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-focus: rgba(229, 9, 20, 0.6);
            --font-main: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --radius-main: 16px;
            --radius-pill: 100px;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-smooth: all 0.6s var(--ease-out-expo);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Fluid Premium Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: #1f1f2e;
            border-radius: var(--radius-pill);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2f2f45;
        }

        /* Glassmorphic Top Bar Navigation Component */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 6%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,7,0.95) 0%, rgba(5,5,7,0) 100%);
            backdrop-filter: blur(0px);
            transition: var(--transition-smooth);
        }

        header.scrolled {
            padding: 14px 6%;
            background: rgba(15, 15, 19, 0.8);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.8px;
        }

        .logo span {
            color: var(--accent-primary);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .category-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-subtle);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        /* Micro-Interactive Search Bar */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-container input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            padding: 10px 16px 10px 42px;
            border-radius: var(--radius-pill);
            color: white;
            font-size: 0.85rem;
            font-family: var(--font-main);
            outline: none;
            width: 240px;
            transition: var(--transition-smooth);
        }

        .search-container input:focus {
            width: 340px;
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.2);
        }

        .search-container svg {
            position: absolute;
            left: 16px;
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
            transition: var(--transition-smooth);
            pointer-events: none;
        }

        .search-container input:focus + svg {
            fill: var(--accent-primary);
        }

        /* Cinematic Spotlight Background Hero System */
        .spotlight-hero {
            height: 90vh;
            min-height: 600px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 6%;
            background-size: cover !important;
            background-position: center 15% !important;
            background-repeat: no-repeat !important;
            margin-bottom: -40px;
            transition: background 0.8s ease-in-out;
        }

        .spotlight-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(5,5,7,0.98) 20%, rgba(5,5,7,0.6) 50%, rgba(5,5,7,0) 90%),
                        linear-gradient(to top, var(--bg-deep) 0%, rgba(5,5,7,0.2) 30%, rgba(5,5,7,0) 100%);
            z-index: 1;
        }

        .hero-inner {
            max-width: 650px;
            z-index: 2;
            margin-top: 40px;
        }

        .badge-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .spotlight-badge {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #b80710 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
        }

        .genre-badge {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 4px 24px rgba(0,0,0,0.7);
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 600;
        }

        .rating-star {
            color: var(--text-accent);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
        }

        .hero-description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: rgba(245, 245, 247, 0.75);
            margin-bottom: 36px;
        }

        .btn-stream {
            background: var(--text-primary);
            color: var(--bg-deep);
            border: none;
            padding: 16px 36px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: var(--radius-main);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }

        .btn-stream:hover {
            transform: translateY(-4px);
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 15px 35px var(--accent-glow);
        }

        /* Immersive Row Carousels Structure Framework */
        .content-wrap {
            padding: 0 0 100px 0;
            position: relative;
            z-index: 5;
        }

        .row-container {
            margin-bottom: 40px;
            position: relative;
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            margin-bottom: 20px;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .row-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-primary);
            border-radius: var(--radius-pill);
        }

        /* Carousel Navigation Switches Control buttons */
        .carousel-arrows {
            display: flex;
            gap: 10px;
        }

        .arrow-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .arrow-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .arrow-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Horizontal View Track Strip Wrapper */
        .carousel-viewport {
            padding: 10px 6% 30px 6%;
            overflow-x: auto;
            scroll-behavior: smooth;
            display: flex;
            gap: 24px;
            scrollbar-width: none; /* Hide standard Firefox scroll loops */
        }

        .carousel-viewport::-webkit-scrollbar {
            display: none; /* Hide Standard Chrome/Safari Engine Track lines */
        }

        /* Premium Infinite Cards Layout Frame Design */
        .media-card {
            flex: 0 0 240px; /* Locked explicit aspect card width size */
            background: var(--bg-surface);
            border-radius: var(--radius-main);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: var(--transition-smooth);
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .media-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: var(--bg-surface-elevated);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .poster-wrapper {
            position: relative;
            padding-top: 145%;
            background: #13131a;
            overflow: hidden;
        }

        .poster-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s var(--ease-out-expo);
        }

        .media-card:hover .poster-wrapper img {
            transform: scale(1.06);
        }

        .card-dark-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 5, 7, 0.9) 0%, rgba(5, 5, 7, 0.1) 60%, transparent 100%);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .media-card:hover .card-dark-overlay {
            opacity: 1;
        }

        .floating-play-btn {
            background: var(--accent-primary);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px var(--accent-glow);
            transform: scale(0.8) translateY(15px);
            transition: var(--transition-smooth);
        }

        .media-card:hover .floating-play-btn {
            transform: scale(1) translateY(0);
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-tag {
            color: var(--accent-primary);
        }

        .card-rating {
            color: var(--text-accent);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .card-genre {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Skeletons Shimmer Loading Screen Animations UX */
        .skeleton-card {
            flex: 0 0 240px;
            height: 420px;
            background: var(--bg-surface);
            border-radius: var(--radius-main);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        .skeleton-poster {
            height: 320px;
            background: linear-gradient(90deg, #121217 25%, #1c1c24 50%, #121217 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite linear;
        }

        .skeleton-text {
            margin: 16px;
            height: 16px;
            background: linear-gradient(90deg, #121217 25%, #1c1c24 50%, #121217 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite linear;
            border-radius: 4px;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Cinema Player Frame Overlay Modal Module View */
        .player-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 3, 5, 0.96);
            backdrop-filter: blur(25px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .player-modal.active {
            display: flex;
            opacity: 1;
        }

        .player-window-box {
            width: 94%;
            max-width: 1200px;
            position: relative;
            transform: scale(0.9) translateY(15px);
            transition: var(--transition-smooth);
        }

        .player-modal.active .player-window-box {
            transform: scale(1) translateY(0);
        }

        .cinema-aspect-ratio {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.95), 0 0 150px rgba(229, 9, 20, 0.2);
            border-radius: var(--radius-main);
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cinema-aspect-ratio iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .close-player-btn {
            position: absolute;
            top: -60px;
            right: 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .close-player-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            transform: rotate(90deg);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Empty Search Exception Template State View */
        .empty-search-state {
            width: 100%;
            text-align: center;
            padding: 60px 0;
            color: var(--text-secondary);
        }

        /* ------------------------------------------------------------- */
        /* CRITICAL RESPONSIVE ADAPTIVE MEDIA BREAKPOINT RULES HOOKS */
        /* ------------------------------------------------------------- */
        @media (max-width: 1024px) {
            .hero-title { font-size: 3rem; }
            .spotlight-hero { height: 80vh; }
            .media-card, .skeleton-card { flex: 0 0 200px; }
        }

        @media (max-width: 768px) {
            header { padding: 16px 5%; }
            header.scrolled { padding: 12px 5%; }
            .nav-controls { gap: 16px; }
            .search-container input { width: 180px; }
            .search-container input:focus { width: 240px; }
            .spotlight-hero { height: 70vh; padding: 0 5%; }
            .hero-title { font-size: 2.4rem; letter-spacing: -1px; }
            .hero-description { font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
            .carousel-viewport { gap: 16px; padding-bottom: 20px; }
            .media-card, .skeleton-card { flex: 0 0 170px; }
            .card-body { padding: 12px; }
            .card-title { font-size: 0.88rem; }
            .carousel-arrows { display: none; } /* Rely on touch gestures natively on smaller screen trackpads */
            .close-player-btn { top: 16px; right: 16px; z-index: 10; background: rgba(0, 0, 0, 0.8); }
        }

        @media (max-width: 580px) {
            header { flex-direction: column; gap: 14px; background: var(--bg-deep); padding: 14px 5%; }
            .nav-controls { justify-content: space-between; width: 100%; }
            .category-tabs { flex-grow: 1; }
            .tab-btn { padding: 6px 14px; font-size: 0.8rem; flex-grow: 1; text-align: center; }
            .search-container input { width: 140px; font-size: 0.8rem; }
            .search-container input:focus { width: 160px; }
            .spotlight-hero { height: 60vh; min-height: 420px; padding-top: 90px; }
            .hero-title { font-size: 2rem; }
            .hero-meta, .hero-description { display: none; }
            .media-card, .skeleton-card { flex: 0 0 150px; }
            .row-title { font-size: 1.15rem; }
            .btn-stream { width: 100%; justify-content: center; padding: 12px 24px; }
        }
    </style>
</head>
<body>

    <header id="app-navigation">
        <a href="#" class="logo" onclick="resetFilters(event)">Cine<span>Stream</span></a>
        <div class="nav-controls">
            <div class="category-tabs">
                <button class="tab-btn active" onclick="filterCategory('all', this)">All</button>
                <button class="tab-btn" onclick="filterCategory('movie', this)">Movies</button>
                <button class="tab-btn" onclick="filterCategory('series', this)">Series</button>
            </div>
            <div class="search-container">
                <input type="text" id="live-search" placeholder="Search title, genre...">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
        </div>
    </header>

    <section class="spotlight-hero" id="hero-spotlight-box">
        <div class="hero-inner" id="hero-content-target"></div>
    </section>

    <main class="content-wrap">
        
        <section class="row-container" id="movies-track-wrapper">
            <div class="row-header">
                <h2 class="row-title">Blockbuster Movies</h2>
                <div class="carousel-arrows">
                    <button class="arrow-btn" onclick="scrollCarousel('movies-render-grid', -1)">
                        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <button class="arrow-btn" onclick="scrollCarousel('movies-render-grid', 1)">
                        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </div>
            <div class="carousel-viewport" id="movies-render-grid"></div>
        </section>

        <section class="row-container" id="series-track-wrapper">
            <div class="row-header">
                <h2 class="row-title">Must-Watch Web Series</h2>
                <div class="carousel-arrows">
                    <button class="arrow-btn" onclick="scrollCarousel('series-render-grid', -1)">
                        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <button class="arrow-btn" onclick="scrollCarousel('series-render-grid', 1)">
                        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </div>
            <div class="carousel-viewport" id="series-render-grid"></div>
        </section>

    </main>

    <div class="player-modal" id="global-player-overlay">
        <div class="player-window-box">
            <button class="close-player-btn" id="close-frame-trigger">&times;</button>
            <div class="cinema-aspect-ratio">
                <iframe id="cinema-frame-element" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let activeCategoryFilter = 'all';
        let continuousSearchString = '';

        function initializeStreamingHub() {
            // Render beautiful skeleton placeholders first to maximize loading experience score
            renderSkeletons('movies-render-grid');
            renderSkeletons('series-render-grid');

            if (typeof contentDatabase === 'undefined') {
                console.error("Data binding reference connection broken: data.js file error!");
                return;
            }

            // Simulate slight system initialization latency to show shimmer effects cleanly
            setTimeout(() => {
                renderShowcaseSpotlightHero();
                renderMediaGridCollections(contentDatabase);
                setupSearchEngineListener();
            }, 600);
        }

        function renderSkeletons(targetId) {
            const target = document.getElementById(targetId);
            target.innerHTML = Array(5).fill(0).map(() => `
                <div class="skeleton-card">
                    <div class="skeleton-poster"></div>
                    <div class="skeleton-text" style="width: 60%"></div>
                    <div class="skeleton-text" style="width: 40%"></div>
                </div>
            `).join('');
        }

        function renderShowcaseSpotlightHero(explicitItem = null) {
            if (contentDatabase.length === 0) return;
            
            // By default, find the highest rated item if none is passed
            const heroItem = explicitItem || [...contentDatabase].sort((a,b) => parseFloat(b.rating) - parseFloat(a.rating))[0];

            const heroBox = document.getElementById('hero-spotlight-box');
            const targetInner = document.getElementById('hero-content-target');
            
            heroBox.style.background = `url('${heroItem.poster}')`;

            targetInner.innerHTML = `
                <div class="badge-row">
                    <span class="spotlight-badge">Spotlight ${heroItem.type}</span>
                    <span class="genre-badge">${heroItem.genre}</span>
                </div>
                <h1 class="hero-title">${heroItem.title}</h1>
                <div class="hero-meta">
                    <span class="rating-star">★ ${heroItem.rating} IMDb</span>
                    <span>•</span>
                    <span>Ultra HD 4K</span>
                </div>
                <p class="hero-description">${heroItem.description || ''}</p>
                <button class="btn-stream" onclick="openCinemaScreen('${heroItem.streamUrl}')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play Feature
                </button>
            `;
        }

        function renderMediaGridCollections(filteredDataset) {
            const movieGrid = document.getElementById('movies-render-grid');
            const seriesGrid = document.getElementById('series-render-grid');
            const movieTrack = document.getElementById('movies-track-wrapper');
            const seriesTrack = document.getElementById('series-track-wrapper');

            movieGrid.innerHTML = '';
            seriesGrid.innerHTML = '';
            let countMovies = 0, countSeries = 0;

            filteredDataset.forEach(item => {
                if (activeCategoryFilter !== 'all' && item.type !== activeCategoryFilter) return;

                const card = document.createElement('div');
                card.className = 'media-card';
                card.innerHTML = `
                    <div class="poster-wrapper">
                        <img src="${item.poster}" alt="${item.title}" loading="lazy">
                        <div class="card-dark-overlay">
                            <div class="floating-play-btn">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-info-header">
                            <span class="type-tag">${item.type}</span>
                            <span class="card-rating">★ ${item.rating}</span>
                        </div>
                        <h3 class="card-title" title="${item.title}">${item.title}</h3>
                        <span class="card-genre">${item.genre}</span>
                    </div>
                `;
                
                // Clicking triggers player
                card.addEventListener('click', () => openCinemaScreen(item.streamUrl));
                
                // Hovering changes the Hero background dynamically (Netflix style)
                card.addEventListener('mouseenter', () => renderShowcaseSpotlightHero(item));

                if (item.type === 'movie') {
                    movieGrid.appendChild(card);
                    countMovies++;
                } else if (item.type === 'series') {
                    seriesGrid.appendChild(card);
                    countSeries++;
                }
            });

            movieTrack.style.display = countMovies > 0 ? 'block' : 'none';
            seriesTrack.style.display = countSeries > 0 ? 'block' : 'none';

            if (countMovies === 0 && countSeries === 0) {
                movieTrack.style.display = 'block';
                movieGrid.innerHTML = `<div class="empty-search-state"><p>No titles match your criteria.</p></div>`;
            }
        }

        function scrollCarousel(viewportId, direction) {
            const viewport = document.getElementById(viewportId);
            const scrollAmount = 500 * direction;
            viewport.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        }

        function setupSearchEngineListener() {
            document.getElementById('live-search').addEventListener('input', (e) => {
                continuousSearchString = e.target.value.toLowerCase().trim();
                executeCombinedFilters();
            });
        }

        function filterCategory(category, elementPointer) {
            activeCategoryFilter = category;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            elementPointer.classList.add('active');
            executeCombinedFilters();
        }

        function executeCombinedFilters() {
            const filtered = contentDatabase.filter(item => 
                item.title.toLowerCase().includes(continuousSearchString) || 
                item.genre.toLowerCase().includes(continuousSearchString)
            );
            renderMediaGridCollections(filtered);
        }

        function resetFilters(e) {
            e.preventDefault();
            document.getElementById('live-search').value = '';
            continuousSearchString = '';
            filterCategory('all', document.querySelector('.category-tabs .tab-btn'));
        }

        const globalModal = document.getElementById('global-player-overlay');
        const framePlayer = document.getElementById('cinema-frame-element');

        function openCinemaScreen(url) {
            framePlayer.src = url;
            globalModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCinemaScreen() {
            globalModal.classList.remove('active');
            framePlayer.src = '';
            document.body.style.overflow = '';
        }

        document.getElementById('close-frame-trigger').addEventListener('click', closeCinemaScreen);
        globalModal.addEventListener('click', (e) => { if (e.target === globalModal) closeCinemaScreen(); });
        
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('app-navigation');
            if (window.scrollY > 30) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        document.addEventListener('DOMContentLoaded', initializeStreamingHub);
    </script>
</body>
</html>
