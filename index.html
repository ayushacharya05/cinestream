<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream Ultra | Next-Gen Entertainment Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Design System Architecture Tokens */
        :root {
            --bg-deep: #050508;
            --bg-surface: #0e0e12;
            --bg-surface-elevated: #16161f;
            --accent-primary: #e50914;
            --accent-glow: rgba(229, 9, 20, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #94a3b8;
            --text-accent: #ffcc00;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --font-main: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --radius-main: 16px;
            --radius-pill: 100px;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-smooth: all 0.6s var(--ease-out-expo);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Fluid Premium Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: #1f1f2e;
            border-radius: var(--radius-pill);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2f2f45;
        }

        /* Glassmorphic Top Bar Navigation Component */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 6%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,8,0.95) 0%, rgba(5,5,8,0) 100%);
            transition: var(--transition-smooth);
        }

        header.scrolled {
            padding: 14px 6%;
            background: rgba(14, 14, 18, 0.85);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.8px;
        }

        .logo span {
            color: var(--accent-primary);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .category-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-subtle);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        /* Micro-Interactive Search Bar */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-container input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            padding: 10px 16px 10px 42px;
            border-radius: var(--radius-pill);
            color: white;
            font-size: 0.85rem;
            width: 240px;
            transition: var(--transition-smooth);
            outline: none;
        }

        .search-container input:focus {
            width: 320px;
            border-color: rgba(229, 9, 20, 0.6);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.2);
        }

        .search-container svg {
            position: absolute;
            left: 16px;
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
            pointer-events: none;
        }

        /* Multi-Slide Carousel Architecture Layout */
        .hero-carousel-container {
            position: relative;
            height: 85vh;
            min-height: 580px;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            margin-bottom: 20px;
        }

        .hero-track {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hero-slide {
            width: 33.33333%;
            height: 100%;
            position: relative;
            background-size: cover !important;
            background-position: center 20% !important;
            background-repeat: no-repeat !important;
            display: flex;
            align-items: center;
            padding: 0 6%;
        }

        .hero-slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(5,5,8,0.98) 25%, rgba(5,5,8,0.6) 60%, rgba(5,5,8,0) 90%),
                        linear-gradient(to top, var(--bg-deep) 0%, rgba(5,5,8,0.2) 40%, rgba(5,5,8,0) 100%);
            z-index: 1;
        }

        .hero-inner {
            max-width: 650px;
            z-index: 2;
            position: relative;
        }

        .badge-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .spotlight-badge {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #b80710 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .genre-badge {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.75rem;
        }

        .hero-title {
            font-size: 3.6rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 4px 24px rgba(0,0,0,0.7);
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .rating-star {
            color: var(--text-accent);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
        }

        .hero-description {
            font-size: 1.05rem;
            line-height: 1.6;
            color: rgba(245, 245, 247, 0.75);
            margin-bottom: 36px;
        }

        .btn-stream {
            background: var(--text-primary);
            color: var(--bg-deep);
            border: none;
            padding: 14px 32px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: var(--radius-main);
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }

        .btn-stream:hover {
            transform: translateY(-4px);
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 15px 35px var(--accent-glow);
        }
        
        /* Carousel Slide Dots Controls */
        .carousel-dots {
            position: absolute;
            bottom: 40px;
            right: 6%;
            z-index: 10;
            display: flex;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .dot.active {
            background: var(--accent-primary);
            width: 30px;
            border-radius: var(--radius-pill);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Horizontal Rows and Slider Views */
        .content-wrap {
            padding-bottom: 80px;
        }

        .row-container {
            margin-bottom: 40px;
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            margin-bottom: 20px;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .row-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-primary);
            border-radius: var(--radius-pill);
        }

        .carousel-arrows {
            display: flex;
            gap: 10px;
        }

        .arrow-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .arrow-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .arrow-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .carousel-viewport {
            padding: 10px 6% 20px 6%;
            overflow-x: auto;
            display: flex;
            gap: 24px;
            scrollbar-width: none;
        }

        .carousel-viewport::-webkit-scrollbar {
            display: none;
        }

        /* Premium Media Cards Layout */
        .media-card {
            flex: 0 0 230px;
            background: var(--bg-surface);
            border-radius: var(--radius-main);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
        }

        .media-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: var(--bg-surface-elevated);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-color: rgba(255,255,255,0.1);
        }

        .poster-wrapper {
            position: relative;
            padding-top: 145%;
            background: #121216;
            overflow: hidden;
        }

        .poster-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s var(--ease-out-expo);
        }

        .media-card:hover .poster-wrapper img {
            transform: scale(1.06);
        }

        .card-dark-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5,5,8,0.9) 0%, transparent 70%);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .media-card:hover .card-dark-overlay {
            opacity: 1;
        }

        .info-circle-btn {
            background: white;
            color: black;
            padding: 10px 18px;
            font-weight: 700;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            transform: translateY(15px);
            transition: var(--transition-smooth);
        }

        .media-card:hover .info-circle-btn {
            transform: translateY(0);
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .type-tag {
            color: var(--accent-primary);
        }

        .card-rating {
            color: var(--text-accent);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-genre {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Dedicated Details Presentation Overlay Drawer */
        .details-panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(20px);
            z-index: 1500;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .details-panel-overlay.active {
            display: flex;
            opacity: 1;
        }

        .details-card-box {
            background: var(--bg-surface-elevated);
            width: 90%;
            max-width: 750px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition-smooth);
            position: relative;
        }

        .details-panel-overlay.active .details-card-box {
            transform: scale(1) translateY(0);
        }

        .details-banner-img {
            height: 320px;
            background-size: cover !important;
            background-position: center 20% !important;
            position: relative;
        }

        .details-banner-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-surface-elevated) 0%, transparent 100%);
        }

        .details-info-content {
            padding: 32px;
            position: relative;
        }

        .close-details-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-subtle);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
