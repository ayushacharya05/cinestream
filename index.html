    <script src="app.js"></script>    <script>        /* FEATURE LAYER SCRIPT: Connects dynamic views perfectly without breaking app.js functions */        let trackingCategoryToken = "";        let trackedItemsCounter = 0;        const paginationThreshold = 8; // Adjust to configure item batch limits

        function navigateActiveTab(categoryKey, activeBtn) {            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));            activeBtn.classList.add('active');

            if (categoryKey === 'home') {                closeCategoryModal();                window.scrollTo({ top: 0, behavior: 'smooth' });                return;            }
            openCategoryModal(categoryKey);        }

        function openCategoryModal(categoryKey) {            trackingCategoryToken = categoryKey;            trackedItemsCounter = 0;                        const targetModal = document.getElementById('global-category-overlay');            const targetTitle = document.getElementById('category-title-target');            const targetGrid = document.getElementById('category-grid-target');                        targetTitle.innerText = categoryKey.charAt(0).toUpperCase() + categoryKey.slice(1) + " Collection";            targetGrid.innerHTML = "";                         targetModal.classList.add('active');            document.body.style.overflow = "hidden";                        renderSelectedCategoryView();        }

        function closeCategoryModal() {            document.getElementById('global-category-overlay').classList.remove('active');            document.body.style.overflow = "";                        const originalTabs = document.querySelectorAll('.tab-btn');            originalTabs.forEach(btn => btn.classList.remove('active'));            if (originalTabs[0]) originalTabs[0].classList.add('active');        }

        function renderSelectedCategoryView() {            const targetGrid = document.getElementById('category-grid-target');            const actionsBox = document.getElementById('see-more-action-box');            const targetRowSource = document.getElementById(`${trackingCategoryToken}-render-grid`);

            if (!targetRowSource) {                targetGrid.innerHTML = `<p class="empty-placeholder-msg">No media entries found for this category tier.</p>`;                actionsBox.style.display = "none";                return;            }

            const rawSourceCards = Array.from(targetRowSource.querySelectorAll('.media-card'));            const batchLimitIndex = trackedItemsCounter + paginationThreshold;            const itemsToPopulate = rawSourceCards.slice(trackedItemsCounter, batchLimitIndex);

            if (itemsToPopulate.length === 0 && trackedItemsCounter === 0) {                targetGrid.innerHTML = `<p class="empty-placeholder-msg">No entries available in this grid tier.</p>`;                actionsBox.style.display = "none";                return;            }

            itemsToPopulate.forEach(card => {                const structuralClone = card.cloneNode(true);                
                // FIX: Proxy the click event directly to the original homepage carousel row card element
                structuralClone.addEventListener('click', (e) => {
                    card.click();
                });
                
                targetGrid.appendChild(structuralClone);            });

            trackedItemsCounter += itemsToPopulate.length;            actionsBox.style.display = (trackedItemsCounter >= rawSourceCards.length) ? "none" : "flex";        }

        function loadNextCategoryBatch() {            renderSelectedCategoryView();        }

        function resetFilters(event) {            event.preventDefault();            closeCategoryModal();            window.scrollTo({ top: 0, behavior: 'smooth' });        }
